# archlint configuration for deskd
# See: https://github.com/mshogin/archlint
#
# Schema: archlint-rs (Rust engine)
# All rules use the flat schema: rules.<rule>.{enabled, level, threshold, exclude}
# Levels: taboo (CI blocker, exit 1) | telemetry (track, exit 0) | personal (info, exit 0)
#
# Current health: 80/100 — 4 violations (dip x4, all telemetry-level)
# Previously 35/100 with old schema (13 violations). Config updated to use
# archlint-rs flat schema + layer enforcement.
# Remaining violations tracked in issues #193, #195, #196.

# Domain Model
# =============
# deskd is an agent orchestration runtime. Core domain concepts:
#
# Domain Layer (pure logic, no I/O):
#   - message    : routable envelope with payload, source, target, reply_to
#   - context    : agent memory/context materialization
#   - task       : task definition and state
#
# Application Layer (orchestration):
#   - worker     : message loop — receive task, execute, reply
#   - schedule   : cron-based bus event firing
#   - mcp        : MCP server — expose bus tools to Claude subprocess
#   - graph      : skill graph execution engine
#   - workflow   : workflow engine (SM-based orchestration)
#   - statemachine: state machine primitives
#
# Infrastructure Layer (I/O, external systems):
#   - bus        : Unix socket pub/sub message transport
#   - agent      : Claude CLI subprocess management + state persistence
#   - inbox      : legacy file-based inbox
#   - unified_inbox: consolidated inbox
#   - tasklog    : persistent task log
#   - config     : YAML config parsing, env var expansion
#   - adapters/  : external system bridges (telegram, discord)
#
# Entry Points / CLI:
#   - main       : clap CLI, wires everything together
#   - lib        : library re-exports
#   - bin/session2graph : standalone CLI tool

# ---- Layer enforcement -------------------------------------------------------
# archlint-rs supports layer rules via `layers` + `allowed_dependencies`.
# Mapping each src module to its architectural layer.
#
# Desired dependency directions:
#   cli -> app, infra, domain
#   app -> domain, infra
#   infra -> domain
#   domain -> (nothing)

layers:
  - name: domain
    paths:
      - "src/message"
      - "src/context"
      - "src/task"

  - name: infra
    paths:
      - "src/bus"
      - "src/agent"
      - "src/acp"           # ACP client: imports agent + config, belongs in infra
      - "src/inbox"
      - "src/unified_inbox"
      - "src/tasklog"
      - "src/config"
      - "src/adapters"
      - "src/adapters/telegram"
      - "src/adapters/discord"

  - name: app
    paths:
      - "src/worker"
      - "src/schedule"
      - "src/mcp"
      - "src/graph"
      - "src/workflow"
      - "src/statemachine"

  - name: cli
    paths:
      - "src/main"
      - "src/lib"
      - "src/bin/session2graph"

# Direction: what each layer is allowed to import from.
# Violations are currently telemetry-level (see fan_in/fan_out rules below).
# Enable error_on_violation once active refactoring (#193, #195, #196) completes.
allowed_dependencies:
  domain: []                        # pure types: no runtime deps
  infra: ["domain"]                 # infrastructure uses domain types, not app logic
  app: ["domain", "infra"]          # application orchestrates infra via domain
  cli: ["domain", "infra", "app"]   # entry point assembles everything

# ---- Rules -------------------------------------------------------------------

rules:
  # Fan-out: how many internal modules does a component depend on.
  # src::main is a CLI entry point — excluded; high fan-out is expected there.
  # src::lib is a re-export shim — excluded.
  # src::worker fan-out 7 is tracked (open issue: introduce port traits, #193).
  fan_out:
    enabled: true
    level: telemetry          # track but don't block CI; tighten to taboo post-refactor
    threshold: 7              # relaxed from default 5 while refactoring in progress
    exclude:
      - "src::main"           # CLI assembler: intentionally high fan-out
      - "src::lib"            # re-export shim: intentionally high fan-out

  # Fan-in: how many components depend on a given module.
  # src::config has fan-in 12 (tracked: split in progress, PR #184 reduced it from 17).
  fan_in:
    enabled: true
    level: telemetry
    threshold: 12             # relaxed from default 10 to match current state post-#184
    exclude: []

  # Cycles: circular dependencies between modules.
  # Currently clean — enforce as taboo to prevent regressions.
  cycles:
    enabled: true
    level: taboo              # any cycle is a CI blocker
    threshold: 0

  # ISP: traits with too many methods (interface segregation principle).
  # Issues #179 (TaskRepository, 9 methods) and #180 (StateMachineRepository, 6 methods)
  # are open. Track at telemetry until those splits land.
  isp:
    enabled: true
    level: telemetry
    threshold: 7              # relaxed from default 5; tighten once #179/#180 are done

  # DIP: modules with structs but no trait definitions.
  # 9 modules currently flagged. Active work: #193 (Executor trait), #195 (MCP handlers),
  # #196 (data-only module exceptions).
  # Data-only modules (message, context, task, acp) are excluded — structs-without-traits
  # is correct for pure data transfer objects.
  dip:
    enabled: true
    level: telemetry          # tracked; promote to taboo once refactoring clears backlog
    exclude:
      - "src::message"        # DTO: pure data types, traits not applicable
      - "src::context"        # DTO: context materialization structs
      - "src::task"           # DTO: task state structs
      - "src::config"         # value-object config: structs intentionally concrete
      - "src::bin::session2graph"  # standalone tool: not part of core domain
