rules:
  fan_out:
    enabled: true
    error_on_violation: false
    level: telemetry
    threshold: 10  # measured: max fan-out ~9 (worker.rs) after app/domain/infra/ports refactor
  fan_in:
    enabled: true
    error_on_violation: false
    level: telemetry
    threshold: 14  # measured: domain types naturally high (statemachine=13, message=11, config=11)
  dip:
    enabled: true
    error_on_violation: false
    level: telemetry
